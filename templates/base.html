<!DOCTYPE html>
<html lang="en" data-theme="dark" data-lang="en">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}EdexFun{% endblock %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Boogaloo&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        /* ── DARK THEME (default) ─────────────────────────── */
        :root, [data-theme="dark"] {
            --bg: #0f0e17;
            --surface: #1a1a2e;
            --surface2: #16213e;
            --accent: #ff6b35;
            --accent2: #f7c59f;
            --teal: #00d4aa;
            --yellow: #ffe347;
            --pink: #ff4d9e;
            --blue: #4cc9f0;
            --purple: #9b5de5;
            --text: #fffffe;
            --text-muted: #a7a9be;
            --border: rgba(255,255,255,0.08);
            --glow: 0 0 20px rgba(255,107,53,0.4);
            --radius: 16px;
            --font-display: 'Boogaloo', cursive;
            --font-body: 'Nunito', sans-serif;
            --nav-bg: rgba(26,26,46,0.92);
            --input-bg: rgba(255,255,255,0.05);
            --shadow: 0 4px 24px rgba(0,0,0,0.4);
        }
        /* ── LIGHT THEME ──────────────────────────────────── */
        [data-theme="light"] {
            --bg: #f5f5f0;
            --surface: #ffffff;
            --surface2: #f0ede8;
            --accent: #e85d1a;
            --accent2: #c44a0d;
            --teal: #008f73;
            --yellow: #c8960c;
            --pink: #c4006a;
            --blue: #0072b5;
            --purple: #6b2fb3;
            --text: #1a1a2e;
            --text-muted: #5a5c72;
            --border: rgba(0,0,0,0.1);
            --glow: 0 0 20px rgba(232,93,26,0.2);
            --nav-bg: rgba(255,255,255,0.95);
            --input-bg: rgba(0,0,0,0.04);
            --shadow: 0 4px 24px rgba(0,0,0,0.1);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background: var(--bg); color: var(--text);
            font-family: var(--font-body); min-height: 100vh;
            transition: background 0.3s, color 0.3s;
        }
        [data-theme="dark"] body {
            background-image:
                radial-gradient(ellipse at 20% 0%,  rgba(155,93,229,0.15) 0%, transparent 60%),
                radial-gradient(ellipse at 80% 100%, rgba(255,107,53,0.12) 0%, transparent 60%);
        }

        /* ── NAV ──────────────────────────────────────────── */
        nav {
            background: var(--nav-bg); backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border);
            padding: 0 1.5rem; height: 56px;
            display: flex; align-items: center; justify-content: space-between;
            position: sticky; top: 0; z-index: 100; box-shadow: var(--shadow);
        }
        .nav-logo {
            font-family: var(--font-display); font-size: 1.7rem;
            color: var(--accent); text-decoration: none; letter-spacing: 1px;
        }
        .nav-logo span { color: var(--yellow); }
        .nav-links { display: flex; gap: 0.35rem; align-items: center; flex-wrap: wrap; }
        .nav-links a {
            color: var(--text-muted); text-decoration: none;
            padding: 0.4rem 0.85rem; border-radius: 8px;
            font-weight: 600; font-size: 0.88rem; transition: all 0.2s;
        }
        .nav-links a:hover { color: var(--text); background: var(--border); }
        .nav-icon-btn {
            height: 36px; border-radius: 8px;
            background: transparent; border: 1px solid var(--border);
            color: var(--text-muted); font-size: 0.85rem;
            cursor: pointer; display: flex; align-items: center; justify-content: center;
            transition: all 0.2s; flex-shrink: 0; padding: 0 0.55rem;
            font-family: var(--font-body); font-weight: 700; gap: 0.25rem;
        }
        .nav-icon-btn:hover { background: var(--border); color: var(--text); border-color: var(--accent); }
        .nav-icon-btn.active { background: rgba(255,107,53,0.15); color: var(--accent); border-color: var(--accent); }

        /* Language dropdown */
        .lang-wrapper { position: relative; }
        .lang-menu {
            display: none; position: absolute; top: calc(100% + 6px); right: 0;
            background: var(--surface); border: 1px solid var(--border);
            border-radius: 10px; overflow: hidden; box-shadow: var(--shadow);
            min-width: 130px; z-index: 999;
        }
        .lang-menu.open { display: block; }
        .lang-menu button {
            display: flex; align-items: center; gap: 0.5rem; width: 100%;
            padding: 0.6rem 1rem; background: none; border: none;
            color: var(--text); font-family: var(--font-body); font-size: 0.88rem;
            font-weight: 600; cursor: pointer; transition: background 0.15s;
        }
        .lang-menu button:hover { background: var(--border); }
        .lang-menu button.selected { color: var(--accent); }

        /* ── BUTTONS ──────────────────────────────────────── */
        .btn {
            display: inline-flex; align-items: center; gap: 0.5rem;
            padding: 0.6rem 1.4rem; border-radius: 10px;
            font-family: var(--font-body); font-weight: 700; font-size: 0.9rem;
            cursor: pointer; border: none; transition: all 0.2s; text-decoration: none;
        }
        .btn-primary { background: var(--accent); color: white; }
        .btn-primary:hover { filter: brightness(1.1); transform: translateY(-1px); box-shadow: 0 4px 16px rgba(255,107,53,0.4); }
        .btn-secondary { background: var(--surface2); color: var(--text); border: 1px solid var(--border); }
        .btn-secondary:hover { background: var(--border); }
        .btn-danger { background: rgba(255,77,158,0.15); color: var(--pink); border: 1px solid var(--pink); }
        .btn-danger:hover { background: var(--pink); color: white; }
        .btn-teal { background: rgba(0,212,170,0.15); color: var(--teal); border: 1px solid var(--teal); }
        .btn-teal:hover { background: var(--teal); color: var(--bg); }
        .btn-sm { padding: 0.35rem 0.9rem; font-size: 0.8rem; border-radius: 8px; }

        /* ── BADGES ───────────────────────────────────────── */
        .badge { display: inline-flex; align-items: center; padding: 0.2rem 0.6rem; border-radius: 6px; font-size: 0.75rem; font-weight: 700; }
        .badge-public  { background: rgba(0,212,170,0.15);   color: var(--teal); }
        .badge-private { background: rgba(167,169,190,0.15); color: var(--text-muted); }
        .badge-pending { background: rgba(255,227,71,0.15);  color: var(--yellow); }

        .card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 1.5rem; }
        .container { max-width: 1200px; margin: 0 auto; padding: 0 1.5rem; }

        /* ── TOASTS ───────────────────────────────────────── */
        .toast-container { position: fixed; bottom: 1.5rem; right: 1.5rem; display: flex; flex-direction: column; gap: 0.5rem; z-index: 9999; }
        .toast {
            background: var(--surface2); border: 1px solid var(--border);
            border-radius: 12px; padding: 0.75rem 1.25rem; color: var(--text);
            font-weight: 600; animation: slideIn 0.3s ease;
            display: flex; align-items: center; gap: 0.5rem; box-shadow: var(--shadow);
        }
        .toast.success { border-left: 3px solid var(--teal); }
        .toast.error   { border-left: 3px solid var(--pink); }
        @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }

        /* ── MODALS (base, used by admin panel etc.) ───────── */
        .modal-overlay {
            position: fixed; inset: 0;
            background: rgba(0,0,0,0.55); backdrop-filter: blur(3px);
            z-index: 1000; display: flex; align-items: center; justify-content: center; padding: 1rem;
        }
        .modal {
            background: var(--surface); border: 1px solid var(--border);
            border-radius: 20px; padding: 2rem; width: 100%; max-width: 560px;
            animation: popIn 0.25s ease; box-shadow: var(--shadow);
        }
        @keyframes popIn { from { transform: scale(0.92); opacity: 0; } to { transform: scale(1); opacity: 1; } }
        .modal h2 { font-family: var(--font-display); font-size: 1.6rem; margin-bottom: 1.5rem; }

        /* ── FORMS ────────────────────────────────────────── */
        .form-group { margin-bottom: 1.2rem; }
        .form-group label { display: block; font-weight: 700; font-size: 0.85rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 0.4rem; }
        .form-control { width: 100%; background: var(--input-bg); border: 1px solid var(--border); border-radius: 10px; padding: 0.65rem 1rem; color: var(--text); font-family: var(--font-body); font-size: 0.95rem; transition: border-color 0.2s; }
        .form-control:focus { outline: none; border-color: var(--accent); background: rgba(255,107,53,0.05); }
        select.form-control option { background: var(--surface2); }

        {% block extra_styles %}{% endblock %}
    </style>
</head>
<body>

                <div class="lang-menu" id="langMenu">

                    <button onclick="setLang('ru')" id="langOptRu">🇷🇺 Русский</button>
                </div>
            </div>
            <a href="/accounts/logout/" class="btn btn-secondary btn-sm" data-i18n="nav_sign_out">Sign Out</a>
        </div>
    </nav>
    {% endif %}

    {% block content %}{% endblock %}

    // ═══════════════════════════════════════════════════════
    // LANGUAGE ENGINE
    // ═══════════════════════════════════════════════════════
    let _lang = localStorage.getItem('bbLang') || 'en';

    function t(key) {
        return (TRANSLATIONS[_lang] && TRANSLATIONS[_lang][key]) ||
               (TRANSLATIONS['en'][key]) || key;
    }

    function applyLang() {
        document.documentElement.setAttribute('data-lang', _lang);
        document.documentElement.setAttribute('lang', _lang);
        // Translate all [data-i18n] elements
        document.querySelectorAll('[data-i18n]').forEach(el => {
            const key = el.getAttribute('data-i18n');
            const val = t(key);
            if (el.tagName === 'INPUT' || el.tagName === 'TEXTAREA') {
                if (el.placeholder !== undefined) el.placeholder = val;
            } else {
                el.innerHTML = val;
            }
        });
        // Translate [data-i18n-ph] placeholders
        document.querySelectorAll('[data-i18n-ph]').forEach(el => {
            el.placeholder = t(el.getAttribute('data-i18n-ph'));
        });
        // Update lang button label
        const lbl = document.getElementById('navLangLabel');
        if (lbl) lbl.textContent = _lang.toUpperCase();
        // Update selected state in menu
        document.getElementById('langOptEn')?.classList.toggle('selected', _lang === 'en');
        document.getElementById('langOptRu')?.classList.toggle('selected', _lang === 'ru');
        // Let each page react if it has a handler
        if (typeof onLangChange === 'function') onLangChange(_lang);
    }

    function setLang(lang) {
        _lang = lang;
        localStorage.setItem('bbLang', lang);
        closeLangMenu();
        applyLang();
    }

    function toggleLangMenu() {
        document.getElementById('langMenu').classList.toggle('open');
    }
    function closeLangMenu() {
        document.getElementById('langMenu')?.classList.remove('open');
    }
    // Close lang menu when clicking outside
    document.addEventListener('click', e => {
        if (!e.target.closest('.lang-wrapper')) closeLangMenu();
    });

    // ── THEME ──────────────────────────────────────────────
    (function() {
        const saved = localStorage.getItem('bbTheme') || 'dark';
        document.documentElement.setAttribute('data-theme', saved);
    })();

    function navToggleTheme() {
        const html = document.documentElement;
        const next = html.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
        html.setAttribute('data-theme', next);
        localStorage.setItem('bbTheme', next);
        document.getElementById('navThemeBtn').textContent = next === 'dark' ? '🌙' : '☀️';
    }

    // ── SOUND ──────────────────────────────────────────────
    let _globalMuted = localStorage.getItem('bbMuted') === 'true';

    function navToggleSound() {
        _globalMuted = !_globalMuted;
        localStorage.setItem('bbMuted', _globalMuted);
        _updateSoundBtn();
        if (typeof muted !== 'undefined') {
            muted = _globalMuted;
            if (typeof bgGain !== 'undefined' && bgGain && typeof getCtx !== 'undefined') {
                bgGain.gain.setTargetAtTime(_globalMuted ? 0 : 0.06, getCtx().currentTime, 0.3);
            }
        }
    }
    function _updateSoundBtn() {
        const btn = document.getElementById('navSoundBtn');
        if (btn) { btn.textContent = _globalMuted ? '🔇' : '🔊'; btn.classList.toggle('active', _globalMuted); }
    }

    // ── TOASTS ─────────────────────────────────────────────
    function showToast(msg, type='success') {
        const c = document.getElementById('toastContainer');
        const t = document.createElement('div');
        t.className = `toast ${type}`;
        t.innerHTML = (type === 'success' ? '✅ ' : '❌ ') + msg;
        c.appendChild(t);
        setTimeout(() => t.remove(), 3500);
    }

    function getCookie(name) {
        const v = document.cookie.match('(^|;) ?' + name + '=([^;]*)(;|$)');
        return v ? v[2] : null;
    }

    async function apiFetch(url, options = {}) {
        const defaults = {
            headers: { 'Content-Type': 'application/json', 'X-CSRFToken': getCookie('csrftoken') },
            credentials: 'include',
        };
        const merged = { ...defaults, ...options };
        if (options.headers) merged.headers = { ...defaults.headers, ...options.headers };
        const res = await fetch(url, merged);
        if (!res.ok) {
            const err = await res.json().catch(() => ({ error: 'Request failed' }));
            throw new Error(err.error || err.detail || 'Request failed');
        }
        return res.json();
    }

    // Apply language and icons on DOM ready
    document.addEventListener('DOMContentLoaded', () => {
        const theme = document.documentElement.getAttribute('data-theme');
        const themeBtn = document.getElementById('navThemeBtn');
        if (themeBtn) themeBtn.textContent = theme === 'dark' ? '🌙' : '☀️';
        _updateSoundBtn();
        applyLang();
        // Load site branding
        fetch('/accounts/api/site-settings/', {credentials: 'include'})
            .then(r => r.ok ? r.json() : null)
            .then(s => {
                if (!s) return;
                const logo = document.getElementById('siteLogo');
                if (!logo) return;
                if (s.logo_type === 'image' && s.logo_image_url) {
                    logo.innerHTML = `<img src="${s.logo_image_url}" alt="logo" style="height:36px;object-fit:contain;vertical-align:middle">`;
                } else if (s.logo_text && s.logo_text !== 'EdexFun') {
                    const txt = s.logo_text;
                    const mid = Math.ceil(txt.length / 2);
                    logo.innerHTML = txt.slice(0, mid) + '<span>' + txt.slice(mid) + '</span>';
                }
            })
            .catch(() => {});
    });
    </script>
